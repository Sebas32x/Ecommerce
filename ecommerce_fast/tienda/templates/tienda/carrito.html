<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:30px;
}

h1{
    text-align:center;
    color:#1e293b;
}

.item{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.total{
    margin-top:20px;
    background:#2563eb;
    color:white;
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-size:22px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#16a34a;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}
</style>

</head>
<body>

<h1>🛒 Mi Carrito</h1>

{% for item in items %}
    <div class="item">
    <span>
        {{ item.producto.nombre }}
        x{{ item.cantidad }}
        - ${{ item.producto.precio }}
    </span>
 <a href="{% url 'eliminar_carrito' item.id %}"> ❌ Eliminar  </a>
</div>
{% empty %}
    <p>El carrito está vacío.</p>
{% endfor %}

<h3 class="total">Total: ${{ total }}</h3>

<form method="post" action="{% url 'finalizar_compra' %}">
    {% csrf_token %}
    <button type="submit">💳 Confirmar Compra</button>
</form>
<br>

<a href="{% url 'mostrador' %}">
    ← Seguir comprando
</a>

</form>
</body>
</html>
