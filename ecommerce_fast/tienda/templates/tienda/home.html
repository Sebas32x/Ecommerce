<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Ecommerce Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🚀 Mi Tienda Python</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4 text-center">Nuestros Productos</h2>
        <div class="row">
            {% for p in productos %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    {% if p.imagen_url %}
                        <img src="{{ p.imagen_url }}" class="card-img-top" alt="{{ p.nombre }}" style="height: 200px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ p.nombre }}</h5>
                        <p class="card-text text-muted">{{ p.descripcion }}</p>
                        <h4 class="text-success mt-auto">${{ p.precio }}</h4>
                        <p class="text-secondary small">Stock disponible: {{ p.stock }}</p>
                        <button class="btn btn-primary w-100 mt-2">Agregar al carrito</button>
                    </div>
                </div>
            </div>
            {% empty %}
            <p class="text-center">No hay productos cargados todavía. ¡Andá al admin!</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
