<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding: 20px;
    background-color: #f4f4f4;
}

h1{
    text-align: center;
}

#lista-carrito{
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

.item{
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.total{
    margin-top: 20px;
    font-weight: bold;
    font-size: 20px;
}

button{
    padding: 10px;
    margin-top: 20px;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>🛒 Mi Carrito</h1>

<div id="lista-carrito"></div>

<button id="vaciar">Vaciar carrito</button>

<script>

const lista = document.getElementById("lista-carrito");
const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

if(carrito.length === 0){

    lista.innerHTML = "<p>El carrito está vacío.</p>";

}else{

    carrito.forEach(producto => {

        lista.innerHTML += `
            <div class="item">
                ${producto}
            </div>
        `;

    });

    lista.innerHTML += `
        <div class="total">
            Total de productos: ${carrito.length}
        </div>
    `;
}

document.getElementById("vaciar").addEventListener("click", () => {

    localStorage.removeItem("carrito");

    location.reload();

});

</script>

</body>
</html>
